<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question</title>
    <style>
        body {
            background-color: #ffdae0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.4);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        h1 {
            color: #4a4a4a;
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .speech-bubble {
            background: white;
            padding: 15px 20px;
            border-radius: 20px;
            border: 2px solid #333;
            position: relative;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 20px;
            border-width: 15px 15px 0 0;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            min-height: 100px;
        }

        #yesBtn {
            background-color: #333;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 10;
        }

        #noBtn {
            background-color: #fce4ec;
            color: #4a4a4a;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.2rem;
            cursor: pointer;
            position: absolute;
            transition: all 0.2s ease;
        }

        .shy-text {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #888;
        }

        /* Success Screen Styles */
        .hidden { display: none !important; }
        
        .success-img {
            width: 200px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container" id="mainCard">
        <h1>Hey Siphesihle 💖</h1>
        <p class="subtitle">I has a question...</p>

        <div class="speech-bubble">
            babe, will you do me the honor to be my boyfriend?
        </div>

        <div class="buttons">
            <button id="yesBtn">Yes 💖</button>
            <button id="noBtn">No</button>
        </div>

        <p class="shy-text">The No button is very shy.</p>
    </div>

    <div class="container hidden" id="successCard">
        <h1>YAAAY! 💖</h1>
        <p>I knew you would press yes!!
		love you baby</p>
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpwaG5xZzZqZzRyc2lyZzRyc2lyZzRyc2lyZzRyc2lyZzRyc2lyZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/MDJ9IbxxvDUQM/giphy.gif" alt="Cute Cat" class="success-img">
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const mainCard = document.getElementById('mainCard');
        const successCard = document.getElementById('successCard');

        let yesScale = 1;
        let noClicks = 0;

        // Make the No button move away on hover
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.position = 'absolute';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        });

        // Also move it on click (for mobile users)
        noBtn.addEventListener('click', () => {
            noClicks++;
            yesScale += 0.5;
            yesBtn.style.transform = `scale(${yesScale})`;
            
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        });

        // Success Action
        yesBtn.addEventListener('click', () => {
            mainCard.classList.add('hidden');
            successCard.classList.remove('hidden');
        });
    </script>
</body>
</html>
